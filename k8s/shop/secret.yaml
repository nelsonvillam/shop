apiVersion: v1
kind: Secret
metadata:
  name: shop-secret
  namespace: shop
type: Opaque
stringData:
  # Generate with: openssl rand -base64 64
  JWT_SECRET: CHANGE_ME
  ADMIN_PASSWORD: CHANGE_ME

  # Replace MONGO_USER and MONGO_PASSWORD with values from mongodb/credentials-secret.yaml.
  # Listing all 3 members lets the driver survive a primary re-election without
  # reconnecting — this is the key difference from the directConnection=true docker-compose URI.
  SPRING_DATA_MONGODB_URI: >-
    mongodb://MONGO_USER:MONGO_PASSWORD@mongo-0.mongo-headless:27017,mongo-1.mongo-headless:27017,mongo-2.mongo-headless:27017/shop?authSource=admin&replicaSet=rs0
