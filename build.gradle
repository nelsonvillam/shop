plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.0'
    id 'io.spring.dependency-management' version '1.1.5'
    id 'org.sonarqube' version '5.1.0.4882'
    id 'jacoco'
    id 'checkstyle'
    id 'pmd'
    id 'com.github.spotbugs' version '6.0.19'
    id 'net.ltgt.errorprone' version '4.0.1'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

ext {
    mapstructVersion = '1.5.5.Final'
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-aop'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'
    implementation 'io.micrometer:micrometer-registry-prometheus'
    implementation 'io.micrometer:micrometer-tracing-bridge-brave'
    implementation 'io.zipkin.reporter2:zipkin-reporter-brave'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation "org.mapstruct:mapstruct:${mapstructVersion}"

    compileOnly 'org.projectlombok:lombok'

    annotationProcessor 'org.projectlombok:lombok'
    annotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"

    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'
    implementation 'io.github.resilience4j:resilience4j-spring-boot3:2.2.0'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.testcontainers:mongodb'
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.apache.httpcomponents.client5:httpclient5'

    errorprone 'com.google.errorprone:error_prone_core:2.28.0'
}

test {
    useJUnitPlatform()
    exclude '**/*IT.class'
    jvmArgs '-Dnet.bytebuddy.experimental=true'
    environment 'TESTCONTAINERS_RYUK_DISABLED', 'true'
}

tasks.register('integrationTest', Test) {
    useJUnitPlatform()
    include '**/*IT.class'
    jvmArgs '-Dnet.bytebuddy.experimental=true'
    environment 'TESTCONTAINERS_RYUK_DISABLED', 'true'
    def proxySocket = '/tmp/docker-tc-proxy.sock'
    if (new File(proxySocket).exists()) {
        environment 'TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE', proxySocket
    }
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams false
    }
}

check.dependsOn integrationTest

jacoco {
    toolVersion = '0.8.12'
}

jacocoTestReport {
    dependsOn test, integrationTest
    executionData fileTree(project.buildDir).include('jacoco/*.exec')
    classDirectories.setFrom(files(classDirectories.files.collect {
        fileTree(dir: it, exclude: [
            '**/dto/**',
            '**/entity/**',
            '**/model/**',
            '**/mapper/**',
            '**/config/**',
            '**/*Application*',
        ])
    }))
    reports {
        xml.required  = true
        html.required = true
    }
}

checkstyle {
    toolVersion = '10.17.0'
    configFile = file('config/checkstyle/checkstyle.xml')
    ignoreFailures = false
    maxWarnings = 0
}

pmd {
    toolVersion = '7.5.0'
    ignoreFailures = false
    ruleSets = []
    ruleSetFiles = files('config/pmd/ruleset.xml')
}

spotbugs {
    toolVersion = '4.8.6'
    ignoreFailures = false
    excludeFilter = file('config/spotbugs/exclude.xml')
}

spotbugsMain {
    reports {
        html {
            required = true
            stylesheet = 'fancy-hist.xsl'
        }
        xml {
            required = false
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.fork = true
    options.errorprone {
        enabled = true
        disableWarningsInGeneratedCode = true
    }
}

sonar {
    properties {
        property 'sonar.projectKey',   'nelsonvillam_shop'
        property 'sonar.organization', 'nelsonvillam'
        property 'sonar.coverage.jacoco.xmlReportPaths', 'build/reports/jacoco/test/jacocoTestReport.xml'
    }
}