apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop
  namespace: shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shop
  template:
    metadata:
      labels:
        app: shop
    spec:
      containers:
        - name: shop
          image: nelsonvillam/shop:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shop-config
            - secretRef:
                name: shop-secret

          # Readiness: checked before routing traffic — includes MongoDB + Redis health.
          # Liveness:  checked continuously — restarts the pod if the JVM is stuck.
          # Both endpoints are enabled by management.health.probes.enabled=true in application.properties.
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
