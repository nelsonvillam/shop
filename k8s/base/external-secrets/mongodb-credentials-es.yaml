apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-credentials
  namespace: shop
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: mongodb-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: shop/mongo-user
    - secretKey: password
      remoteRef:
        key: shop/mongo-password
