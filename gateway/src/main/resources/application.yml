server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: shop
          uri: http://shop:80
          predicates:
            - Path=/**

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    probes:
      enabled: true
  endpoint:
    health:
      show-details: never
