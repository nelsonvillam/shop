apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: shop
spec:
  serviceName: mongo-headless
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      initContainers:
        # The keyFile Secret is mounted read-only and owned by root (mode 0644).
        # MongoDB requires mode 0400 and ownership by the mongodb user (uid 999),
        # so an init container copies it into an emptyDir and fixes permissions.
        - name: keyfile-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /tmp/keyfile-src/keyfile /tmp/keyfile-dst/keyfile
              chmod 400 /tmp/keyfile-dst/keyfile
              chown 999:999 /tmp/keyfile-dst/keyfile
          volumeMounts:
            - name: keyfile-secret
              mountPath: /tmp/keyfile-src
            - name: keyfile-volume
              mountPath: /tmp/keyfile-dst

      containers:
        - name: mongo
          image: mongo:7
          # Use args (not command) so docker-entrypoint.sh runs and creates the
          # root user from MONGO_INITDB_* env vars on first start (empty PVC).
          args:
            - mongod
            - --replSet=rs0
            - --keyFile=/etc/mongodb/keyfile
            - --bind_ip_all
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: password
            - name: MONGO_INITDB_DATABASE
              value: shop
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: keyfile-volume
              mountPath: /etc/mongodb/keyfile
              subPath: keyfile
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

      volumes:
        - name: keyfile-secret
          secret:
            secretName: mongodb-keyfile
        - name: keyfile-volume
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: gp2-csi
        resources:
          requests:
            storage: 10Gi
