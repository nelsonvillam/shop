apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: shop
spec:
  provider:
    aws:
      service: SecretsManager
      region: sa-east-1
      # IRSA: ESO assumes the IAM role annotated on the shop-sa service account.
      # The service account is annotated by the EKS overlay (see kustomization.yaml).
      # Required IAM permissions on the role:
      #   secretsmanager:GetSecretValue on arn:aws:secretsmanager:sa-east-1:660743084735:secret:shop/*
      auth:
        jwt:
          serviceAccountRef:
            name: shop-sa
            namespace: shop
