apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-keyfile
  namespace: shop
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: mongodb-keyfile
    creationPolicy: Owner
  data:
    - secretKey: keyfile
      remoteRef:
        key: shop/mongodb-keyfile
