apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: shop
spec:
  provider:
    aws:
      service: SecretsManager
      region: sa-east-1
      # Static credentials stored in an aws-credentials k8s Secret.
      # The deploy script creates this secret from the local AWS CLI config.
      # Never commit the aws-credentials Secret to git.
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
          sessionTokenSecretRef:
            name: aws-credentials
            key: session-token
