apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherits all base resources (no storageclass.yaml — Docker Desktop
# already provides the "standard" StorageClass).
resources:
  - ../../base

patches:
  # Replace gp2-csi (EKS EBS) with Docker Desktop's built-in StorageClass
  - patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: standard
    target:
      kind: StatefulSet
      name: mongo
  # Set Swagger server URL to match the port-forward tunnel (localhost:9090)
  - patch: |-
      - op: replace
        path: /data/SPRINGDOC_SERVER_URL
        value: "http://localhost:9090"
    target:
      kind: ConfigMap
      name: shop-config
