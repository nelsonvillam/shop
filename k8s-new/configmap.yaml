apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-config
  namespace: shop
data:
  SPRING_PROFILES_ACTIVE: prod
  # K8s DNS resolves these short names within the shop namespace automatically:
  #   redis  -> redis.shop.svc.cluster.local
  #   zipkin -> zipkin.shop.svc.cluster.local
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  ZIPKIN_URL: http://zipkin:9411
  # Swagger server URL — overridden per overlay so curl examples match the actual access URL.
  # Empty = SpringDoc auto-detects from request (correct for EKS with a real hostname).
  SPRINGDOC_SERVER_URL: ""
