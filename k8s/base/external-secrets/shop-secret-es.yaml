apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shop-secret
  namespace: shop
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: shop-secret
    creationPolicy: Owner
    template:
      data:
        JWT_SECRET: "{{ .jwt_secret }}"
        ADMIN_PASSWORD: "{{ .admin_password }}"
        # Assembled from individual secrets so the URI is never stored anywhere in plain text.
        SPRING_DATA_MONGODB_URI: "mongodb://{{ .mongo_user }}:{{ .mongo_password }}@mongo-0.mongo-headless:27017,mongo-1.mongo-headless:27017,mongo-2.mongo-headless:27017/shop?authSource=admin&replicaSet=rs0"
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: shop/jwt-secret
    - secretKey: admin_password
      remoteRef:
        key: shop/admin-password
    - secretKey: mongo_user
      remoteRef:
        key: shop/mongo-user
    - secretKey: mongo_password
      remoteRef:
        key: shop/mongo-password
