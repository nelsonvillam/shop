services:
  mongo:
    image: mongo:7
    entrypoint: ["bash", "/scripts/mongo-init.sh"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: shop
    volumes:
      - mongo-data:/data/db
      - ./scripts/mongo-init.sh:/scripts/mongo-init.sh:ro
    healthcheck:
      test: >
        mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD
        --authenticationDatabase admin --quiet --eval
        "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"

  shop:
    image: nelsonvillam/shop:latest
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/shop?authSource=admin&directConnection=true
      ZIPKIN_URL: http://zipkin:9411
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
      zipkin:
        condition: service_started

  ping-service:
    image: nelsonvillam/ping-service:latest
    ports:
      - "8082:8080"

volumes:
  mongo-data:
  redis-data:
