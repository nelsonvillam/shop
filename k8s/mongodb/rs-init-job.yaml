apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-rs-init
  namespace: shop
spec:
  # backoffLimit gives the Job up to 10 retries so it can wait out slow pod starts.
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init
          image: mongo:7
          command:
            - /bin/bash
            - -c
            - |
              set -e
              HOST=mongo-0.mongo-headless.shop.svc.cluster.local

              echo "Waiting for mongo-0 to accept authenticated connections..."
              until mongosh --host "$HOST" \
                -u "$MONGO_USER" -p "$MONGO_PASSWORD" \
                --authenticationDatabase admin \
                --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q 1; do
                echo "  not ready — retrying in 5s..."
                sleep 5
              done

              echo "Initiating replica set..."
              mongosh --host "$HOST" \
                -u "$MONGO_USER" -p "$MONGO_PASSWORD" \
                --authenticationDatabase admin \
                --eval "
                  try {
                    print('Already initialized: ' + rs.status().set);
                  } catch (e) {
                    rs.initiate({
                      _id: 'rs0',
                      members: [
                        { _id: 0, host: 'mongo-0.mongo-headless.shop.svc.cluster.local:27017' },
                        { _id: 1, host: 'mongo-1.mongo-headless.shop.svc.cluster.local:27017' },
                        { _id: 2, host: 'mongo-2.mongo-headless.shop.svc.cluster.local:27017' }
                      ]
                    });
                    print('Replica set initiated.');
                  }
                "
          env:
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: password
